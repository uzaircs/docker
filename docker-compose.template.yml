name: __STACK_NAME__

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    cpus: '__DEFAULT_CPUS__'
    mem_limit: '__DEFAULT_MEMORY__'
    ports:
      - "80:80"
      - "443:443"
    environment:
      ENABLE_IPV6: "false"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/nginx/certs:/etc/nginx/certs:rw
      - ./docker/nginx/vhost.d:/etc/nginx/vhost.d
      - ./docker/nginx/html:/usr/share/nginx/html
    networks:
      - proxy

  # Add fixed shared services here when needed.
  # Examples: mysql, postgres, redis, mailpit, minio.
  # Generated services default to 0.50 CPU and 512m RAM.
  # The generated docker-compose.yml is rebuilt by install.sh,
  # so put manual service definitions in this template instead.

__AUTO_SERVICES__

networks:
  proxy:
    name: nginx-proxy
